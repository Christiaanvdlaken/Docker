version: "3.4"
services:
  tdarr:
    container_name: ${CONTAINER_NAME}
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - ${PORT_UI}:8265 # webUI port
      - ${PORT_SERVER}:8266 # server port
    environment:
      - TZ=Europe/London
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK_SET=${UMASK}
      - serverIP=0.0.0.0
      - serverPort=${PORT_SERVER}
      - webUIPort=${PORT_UI}
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=MyInternalNode
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/server:/app/server
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/configs:/app/configs
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/logs:/app/logs
      - ${DATA_FOLDER}:/media
      - ${TRANSCODE_CACHE_FOLDER}:/temp

    devices:
      - /dev/dri:/dev/dri
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
    

