services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
      - media_net
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_FOLDER}/bazarr:/config
      - ${DATA_FOLDER}:/data/media
    ports:
      - ${BAZARR_PORT}:6767
    restart: unless-stopped

# Media netwerk zodat alles in hetzelfde netwerk zit en de containers elkaar kunnen vinden
networks:
  media_net:
    external: true