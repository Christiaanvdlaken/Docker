version: "3.7"

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: ${CONTAINER_NAME}
    env_file: 
      - ../.env
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}:/config
      - ${DATA_FOLDER}:/data/media
    ports:
      - ${PORT}:6767
    restart: unless-stopped
