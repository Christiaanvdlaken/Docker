services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS}
      PUID: ${PUID}
      PGID: ${PGID}
    ports:
      - ${HOMEPAGE_PORT}:3000
    volumes:
      - ${CONFIG_FOLDER}/homepage:/config
      - /var/run/docker.sock:/var/run/docker.sock:ro # Mount de Docker socket zodat de container andere containers kan aansturen
    restart: unless-stopped
