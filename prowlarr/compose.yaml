services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - media_net
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    ports:
      - ${PROWLARR_PORT}:9696
    volumes:
      - ${CONFIG_FOLDER}/prowlarr:/config
      - ${DATA_FOLDER}:/data 
    restart: unless-stopped

# Media netwerk zodat alles in hetzelfde netwerk zit en de containers elkaar kunnen vinden
networks:
  media_net:
    external: true