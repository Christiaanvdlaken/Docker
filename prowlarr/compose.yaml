services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    ports:
      - ${PROWLARR_PORT}:9696
    volumes:
      - ${CONFIG_FOLDER}/prowlarr:/config
      - ${DATA_FOLDER}:/data 
    restart: unless-stopped
