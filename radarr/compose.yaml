services:
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - media_net
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_FOLDER}/radarr:/config
      - ${DATA_FOLDER}:/data
    ports:
      - ${RADARR_PORT}:7878
    restart: unless-stopped

# Media netwerk zodat alles in hetzelfde netwerk zit en de containers elkaar kunnen vinden
networks:
  media_net:
    external: true