version: "3.7"

services:
  watchtower:
    container_name: watchtower
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount de Docker socket zodat de container andere containers kan aansturen
    environment:
      - WATCHTOWER_CLEANUP=${WATCHTOWER_CLEANUP}
