services:
  wallos:
    container_name: wallos
    image: bellamy/wallos:latest
    ports:
      - ${WALLOS_PORT}:80
    environment:
      - TZ=${TZ}
    volumes:
      - ${CONFIG_FOLDER}/wallos/db:/var/www/html/db
      - ${CONFIG_FOLDER}/wallos/logos:/var/www/html/images/uploads/logos
    restart: unless-stopped
