services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: ${CONTAINER_NAME}
    env_file: 
      - ../.env
      - .env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
    volumes:
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}:/config
      - ${DATA_FOLDER}:/data
    ports:
      - ${PORT}:8989
    restart: unless-stopped
