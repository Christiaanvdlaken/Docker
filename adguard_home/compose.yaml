services:

  # AdGuard Home: Network-wide ads & trackers blocking DNS server.
  adguardhome:
    container_name: ${CONTAINER_NAME}
    image: adguard/adguardhome:latest
    env_file: 
      - ../.env
      - .env
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "80:80/tcp"
      - "443:443/tcp"
      - "3000:3000/tcp"
    volumes:
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/conf:/opt/adguardhome/conf
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/work:/opt/adguardhome/work
    environment:
      - TZ=${TZ}
    restart: unless-stopped