services:
  db:
    image: mariadb:lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    container_name: nextcloud-db
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS    
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - TZ=${TZ}

  redis:
    image: redis:alpine
    restart: always
    container_name: nextcloud-redis

  app:
    image: nextcloud
    restart: always
    container_name: nextcloud
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS    
    ports:
      - "${NEXTCLOUD_PORT:-8080}:80"
    depends_on:
      - redis
      - db
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/html:/var/www/html
    environment:
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - TZ=${TZ}

  onlyoffice-documentserver:
    image: onlyoffice/documentserver:latest
    container_name: onlyoffice-documentserver
    restart: always
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${ONLYOFFICE_PORT:-80}:80"
      - "${ONLYOFFICE_SSL_PORT:-443}:443"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET}
      #- JWT_HEADER=Authorization
      #- JWT_IN_BODY=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/info/info.json"]
      interval: 30s
      retries: 5
      start_period: 60s
      timeout: 10s
    stdin_open: true
    stop_grace_period: 60s
    volumes:
      - ${CONFIG_FOLDER}/onlyoffice/data:/var/www/onlyoffice/Data
      - ${CONFIG_FOLDER}/onlyoffice/logs:/var/log/onlyoffice
      - ${CONFIG_FOLDER}/onlyoffice/cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
      - ${CONFIG_FOLDER}/onlyoffice/files:/var/www/onlyoffice/documentserver-example/public/files
      - /usr/share/fonts:/usr/share/fonts:ro