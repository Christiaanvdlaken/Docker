services:
  # Note: MariaDB is external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/mariadb
  db:
    # Note: Check the recommend version here: https://docs.nextcloud.com/server/latest/admin_manual/installation/system_requirements.html#server
    image: mariadb:lts
    container_name: nextcloud-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/db:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_NEXTCLOUD}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD_NEXTCLOUD}
      - MARIADB_DATABASE=nextcloud
      - MARIADB_USER=nextcloud

  # Note: Redis is an external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/redis
  redis:
    image: redis:alpine
    restart: always

  app:
    image: nextcloud
    container_name: nextcloud-app
    restart: always
    ports:
      - ${NEXTCLOUD_PORT}:80
    depends_on:
      - redis
      - db
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/app:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD_NEXTCLOUD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db