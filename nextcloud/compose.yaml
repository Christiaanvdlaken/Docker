services:
  nextcloud-aio-mastercontainer:
    image: nextcloud/all-in-one:latest
    init: true
    container_name: nextcloud-aio-mastercontainer
    restart: always
    dns:
      - 1.1.1.1 # Cloudflare DNS
      - 8.8.8.8 # Google DNS
    ports:
      - "8438:8080"
    environment:
      - APACHE_PORT=11000
      # Waar de gebruikersdata van nextcloud opgeslagen wordt
      - NEXTCLOUD_DATADIR=${NAS_FOLDER}/nextcloud/data
      - SKIP_DOMAIN_VALIDATION=true # anders kan ik het niet bereiken via mijn lokale domein
      - AIO_DNS_SUFFIX=1.1.1.1
      - AIO_DISABLE_DNS_CHECK=true
    volumes:
      # De configuratie van de mastercontainer zelf
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer