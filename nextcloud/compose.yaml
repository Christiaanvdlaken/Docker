services:
  db:
    image: mariadb:lts
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    container_name: nextcloud-db
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS    
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - TZ=${TZ}

  redis:
    image: redis:alpine
    restart: always
    container_name: nextcloud-redis

  app:
    image: nextcloud
    restart: always
    container_name: nextcloud
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS    
    ports:
      - "${NEXTCLOUD_PORT:-8080}:80"
    depends_on:
      - redis
      - db
    volumes:
      - ${CONFIG_FOLDER}/nextcloud/html:/var/www/html
    environment:
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - TZ=${TZ}

  euro-office:
    image: ghcr.io/euro-office/documentserver:latest
    container_name: euro-office
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${EUROOFFICE_PORT:-80}:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${EUROOFFICE_JWT_SECRET}
    volumes:
      - ${CONFIG_FOLDER}/euro-office/documentserver:/var/lib/euro-office/documentserver
      - ${CONFIG_FOLDER}/euro-office/logs:/var/log/euro-office/documentserver