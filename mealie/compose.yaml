services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:v1.0.0
    container_name: mealie
    ports:
      - "${MEALIE_PORT}:9000"
    deploy:
      resources:
        limits:
          memory: 1000M
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    volumes:
      - ${CONFIG_FOLDER}/mealie:/app/data/
    environment:
      - ALLOW_SIGNUP=${ALLOW_SIGNUP}
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - BASE_URL=${BASE_URL}:${MEALIE_PORT}
      - DEFAULT_GROUP=${DEFAULT_GROUP}
      - DEFAULT_EMAIL=${DEFAULT_EMAIL}
    restart: always
