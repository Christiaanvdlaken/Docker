services:
  spotweb:
    image: erikdevries/spotweb
    environment:
      - TZ=${TZ}
      - CRON_INTERVAL=*/5 * * * *
    ports:
      - ${SPOTWEB_PORT}:80
    depends_on:
      - mysql
    volumes:
      - ${CONFIG_FOLDER}/spotweb/app:/var/lib/mysql

  mysql:
    image: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD_SPOTWEB}
      - MYSQL_USER=${MYSQL_USER_SPOTWEB}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD_SPOTWEB}
      - MYSQL_DATABASE=spotweb
    volumes:
      - ${CONFIG_FOLDER}/spotweb/db:/var/lib/mysql