services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: 
      - ../.env
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount de Docker socket zodat de container andere containers kan aansturen
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/dockhand_data:/app/data

volumes:
  dockhand_data: