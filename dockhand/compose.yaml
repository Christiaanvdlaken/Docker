services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CONFIG_FOLDER}/${CONTAINER_NAME}/dockhand_data:/app/data

volumes:
  dockhand_data: