services:
  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    ports:
      - "10300:10300"
    volumes:
      - ${CONFIG_FOLDER}:/data
    command: [
      "--model", "medium-int8", 
      "--language", "nl", 
      "--beam-size", "5", 
      "--data-dir", "/data"
    ]