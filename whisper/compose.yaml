services:
  wyoming-whisper:
    image: rhasspy/wyoming-whisper:latest
    container_name: wyoming-whisper
    restart: unless-stopped
    dns:
      - 1.1.1.1 # force cloudflare DNS
      - 8.8.8.8 # force google DNS
    ports:
      - "10300:10300"
    volumes:
      - ${CONFIG_FOLDER}:/data
    command: [
      "--model", "small-int8", 
      "--language", "nl", 
      "--beam-size", "4", # pakt 2 mogelijkheden, en kiest de meestwaarschijlijke. Hoe hoger hoe beter, maar ook trager.
      "--data-dir", "/data"
    ]