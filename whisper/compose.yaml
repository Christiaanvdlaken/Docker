services:
  wyoming-whisper:
    image: ghcr.io/sjtrny/wyoming-whisper-intel:release
    container_name: wyoming-whisper
    restart: unless-stopped
    environment:
      # GPU acceleratie instellingen
      - ONEAPI_DEVICE_SELECTOR=level_zero:gpu
      - ZE_ENABLE_PCI_ID_DEVICE_ORDER=1
      - OMP_NUM_THREADS=4
      
      # Whisper configuratie (nu via env vars)
      - WHISPER_MODEL=large-v3-turbo
      - WHISPER_LANG=nl
      - WHISPER_BEAM_SIZE=2
      - WHISPER_DATA_DIR=/data
      
      # Netwerk configuratie
      - WYOMING_URI=tcp://0.0.0.0:10300
      # Deze zijn intern voor de container, maar vaak nodig voor de interne bridge
      - WHISPER_HTTP_HOST=127.0.0.1
      - WHISPER_HTTP_PORT=8910
    devices:
      # We houden /dev/dri aan voor algemene toegang, 
      # maar voegen de specifieke render node toe zoals in jouw voorbeeld
      - /dev/dri:/dev/dri
      - /dev/dri/renderD128:/dev/dri/renderD128:rwm 
    group_add:
      - "992" 
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "10300:10300"
    volumes:
      - ${CONFIG_FOLDER}/whisper:/data

    # We verwijderen de 'command' sectie volledig omdat de 
    # instellingen nu via 'environment' worden doorgegeven.